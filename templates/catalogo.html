{% extends 'base.html' %}
{% block content %}

<h2>Catálogo de Productos</h2>

<ul>
    {% for producto in productos %}
        <li>
            {{ producto.nombre }} -
            ${{ producto.precio }}
        </li>
    {% empty %}
        <li>No existen productos.</li>
    {% endfor %}
</ul>

{% endblock %}
